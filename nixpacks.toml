[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    NIXPACKS_PHP_FALLBACK_PATH = "/index.php"

[phases.postbuild]
    cmds = [
        "php artisan view:cache"
    ]
    dependsOn = ["build"]

[start]
    cmd = "php artisan migrate --force && php artisan storage:link --force && php artisan config:cache && php artisan route:cache && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
